<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VOD Player</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
<!-- Shaka Player — supports both HLS (.m3u8) and MPEG-DASH (.mpd) -->
<script src="https://ajax.googleapis.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
<style>
  :root {
    --alice:  #F0F8FF;
    --accent: #0d6efd;
    --border: #d0dde8;
    --text:   #1a2332;
    --muted:  #6c757d;
  }

  html, body { height: 100%; margin: 0; background: #fff; color: var(--text); overflow: hidden; }

  /* ── Top bar ── */
  .top-bar {
    background: var(--alice);
    border-bottom: 1px solid var(--border);
    height: 50px;
    display: flex;
    align-items: center;
    padding: 0 1rem;
    gap: .75rem;
  }
  .rec-title-nav {
    font-weight: 600;
    font-size: 1rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 50vw;
    color: var(--text);
  }

  /* ── Layout ── */
  .layout {
    display: flex;
    height: calc(100vh - 50px);
    overflow: hidden;
  }
  .player-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
    min-width: 0;
  }
  .sidebar {
    width: 310px;
    flex-shrink: 0;
    overflow-y: auto;
    background: #fff;
    border-left: 1px solid var(--border);
    padding: 1rem 1.1rem;
  }

  /* ── Video ── */
  .video-wrap {
    flex: 1;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
  }

  /* ── Controls bar ── */
  .controls-bar {
    background: var(--alice);
    border-top: 1px solid var(--border);
    padding: .45rem .9rem;
    display: flex;
    align-items: center;
    gap: .65rem;
    flex-wrap: wrap;
  }
  .seek-wrap { flex: 1; min-width: 120px; }
  input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
  .time-display { font-size: .8rem; color: var(--muted); white-space: nowrap; }
  .vol-wrap { display: flex; align-items: center; gap: .3rem; }

  .ctrl-btn {
    background: none; border: none;
    color: #4a6072; font-size: 1.2rem;
    cursor: pointer; padding: .2rem .3rem;
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    transition: color .1s, background .1s;
  }
  .ctrl-btn:hover { color: var(--accent); background: #dce8f4; }

  #quality-select {
    background: #fff;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: .8rem;
    padding: .2rem .4rem;
    border-radius: 5px;
    cursor: pointer;
  }

  /* Protocol toggle */
  .proto-group .btn {
    font-size: .75rem;
    padding: .18rem .6rem;
    border-color: var(--border);
  }
  .proto-group .btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Sidebar sections ── */
  .sb-section {
    background: var(--alice);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .7rem .85rem;
    margin-bottom: .75rem;
  }
  .sb-section h6 {
    font-size: .67rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    color: #4a6fa5;
    margin-bottom: .5rem;
  }
  .meta-row {
    display: flex;
    justify-content: space-between;
    font-size: .81rem;
    padding: .2rem 0;
    border-bottom: 1px solid var(--border);
  }
  .meta-row:last-child { border-bottom: none; }
  .meta-row .label { color: var(--muted); }
  .meta-row .value { color: var(--text); text-align: right; max-width: 60%; word-break: break-word; }

  .res-btn {
    display: inline-block;
    padding: .18rem .55rem;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: .77rem;
    cursor: pointer;
    margin: 2px;
    color: var(--muted);
    background: #fff;
    transition: all .1s;
  }
  .res-btn:hover { border-color: var(--accent); color: var(--accent); }
  .res-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .tag-chip {
    display: inline-block;
    background: var(--alice);
    border: 1px solid var(--border);
    color: #4a6fa5;
    font-size: .74rem;
    padding: 1px 8px;
    border-radius: 10px;
    margin: 2px;
  }

  /* Manifest URL copy */
  .url-row {
    font-size: .75rem;
    font-family: monospace;
    background: #f4f8fc;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: .25rem .5rem;
    color: #4a6072;
    display: flex;
    align-items: center;
    gap: .4rem;
    word-break: break-all;
  }
  .url-row .copy-btn {
    flex-shrink: 0;
    border: none;
    background: none;
    color: var(--accent);
    cursor: pointer;
    padding: 0;
    font-size: .9rem;
  }

  /* Loading / error overlays */
  #loading-overlay {
    position: absolute; inset: 0;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; gap: 1rem;
  }
  #loading-overlay.hidden { display: none; }

  #error-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.8);
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; gap: .75rem;
    color: #ff8080; text-align: center; padding: 2rem;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="top-bar">
  <a href="/" class="btn btn-sm btn-outline-secondary flex-shrink-0">
    <i class="bi bi-arrow-left"></i> Library
  </a>
  <div class="rec-title-nav" id="nav-title">Loading…</div>
  <div class="ms-auto d-flex gap-2 align-items-center">
    <span id="status-badge" class="badge bg-secondary">—</span>
    <!-- Protocol selector (shown once rec loads) -->
    <div class="btn-group proto-group d-none" id="proto-group" role="group" aria-label="Protocol">
      <button type="button" class="btn btn-sm btn-outline-secondary active" id="btn-hls" onclick="switchProtocol('hls')">HLS</button>
      <button type="button" class="btn btn-sm btn-outline-secondary"        id="btn-dash" onclick="switchProtocol('dash')">DASH</button>
    </div>
    <button class="btn btn-sm btn-outline-secondary" onclick="toggleSidebar()" title="Toggle info panel">
      <i class="bi bi-info-circle"></i>
    </button>
  </div>
</div>

<!-- Main layout -->
<div class="layout">

  <!-- Player column -->
  <div class="player-col">
    <div class="video-wrap">
      <video id="video" preload="auto" playsinline></video>

      <div id="loading-overlay">
        <div class="spinner-border text-primary" style="width:3rem;height:3rem;"></div>
        <div style="color:#aac;" id="loading-msg">Loading stream…</div>
      </div>

      <div id="error-overlay">
        <i class="bi bi-exclamation-triangle-fill fs-1"></i>
        <div id="error-msg">Could not load this recording.</div>
        <button class="btn btn-sm btn-outline-light mt-1" onclick="retryLoad()">Retry</button>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-bar">
      <button class="ctrl-btn" onclick="togglePlay()" title="Play / Pause (Space)">
        <i class="bi bi-play-fill" id="play-icon"></i>
      </button>

      <div class="seek-wrap">
        <input type="range" id="seek-bar" value="0" min="0" max="1000" step="1" oninput="onSeek(this)" />
      </div>

      <span class="time-display">
        <span id="cur-time">0:00</span> / <span id="dur-time">0:00</span>
      </span>

      <div class="vol-wrap">
        <button class="ctrl-btn" onclick="toggleMute()" title="Mute (M)">
          <i class="bi bi-volume-up-fill" id="vol-icon"></i>
        </button>
        <input type="range" id="vol-bar" value="100" min="0" max="100" step="1"
               oninput="setVolume(this.value)" style="width:68px;" />
      </div>

      <select id="quality-select" title="Quality" onchange="setQuality(this.value)">
        <option value="auto">Auto</option>
      </select>

      <button class="ctrl-btn" onclick="toggleFullscreen()" title="Fullscreen (F)">
        <i class="bi bi-fullscreen" id="fs-icon"></i>
      </button>
    </div>
  </div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <div class="sb-section">
      <h6>Recording Info</h6>
      <div id="meta-panel"><div class="text-muted" style="font-size:.84rem;">Loading…</div></div>
    </div>

    <div class="sb-section">
      <h6>Quality</h6>
      <div id="quality-panel"><span class="text-muted" style="font-size:.82rem;">—</span></div>
    </div>

    <div class="sb-section">
      <h6>Stream URLs</h6>
      <div id="url-panel"><span class="text-muted" style="font-size:.82rem;">—</span></div>
    </div>

    <div class="sb-section">
      <h6>Description</h6>
      <div id="desc-panel" style="font-size:.84rem;color:var(--muted);white-space:pre-wrap;word-break:break-word;"></div>
    </div>

    <div class="sb-section">
      <h6>Tags</h6>
      <div id="tags-panel"></div>
    </div>

  </aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ── Routing ────────────────────────────────────────────────────────────────
const recordingId = location.pathname.split('/').pop();
if (!recordingId) location.href = '/';

let shakaPlayer = null;
let rec         = null;
let protocol    = 'hls';    // 'hls' | 'dash'
const video     = document.getElementById('video');

// ── Boot ───────────────────────────────────────────────────────────────────
shaka.polyfill.installAll();

(async () => {
  try {
    rec = await fetchJSON(`/api/recordings/${recordingId}`);
    document.getElementById('nav-title').textContent = rec.title;
    document.title = rec.title + ' — VOD Player';

    const statusColors = { ready:'success', recording:'danger', transcoding:'warning', error:'secondary' };
    const badge = document.getElementById('status-badge');
    badge.textContent = rec.status;
    badge.className = `badge bg-${statusColors[rec.status] || 'secondary'}`;

    populateSidebar(rec);

    if (rec.status === 'ready') {
      // Show protocol toggle; hide DASH button if not available
      const pg = document.getElementById('proto-group');
      pg.classList.remove('d-none');
      if (!rec.dash_available) {
        document.getElementById('btn-dash').disabled = true;
        document.getElementById('btn-dash').title = 'DASH not yet available';
      }
      await initPlayer();
      await loadStream();
    } else if (rec.status === 'transcoding') {
      showError(`Transcoding in progress (${rec.progress}%) — check back soon.`);
    } else if (rec.status === 'recording') {
      showError('Recording in progress — available after transcoding completes.');
    } else {
      showError(rec.error_message || `Recording not ready (status: ${rec.status}).`);
    }
  } catch (e) {
    showError('Failed to load recording: ' + e.message);
  }
})();

// ── Shaka Player init ──────────────────────────────────────────────────────
async function initPlayer() {
  if (shakaPlayer) {
    await shakaPlayer.destroy();
    shakaPlayer = null;
  }
  shakaPlayer = new shaka.Player();
  await shakaPlayer.attach(video);

  shakaPlayer.configure({
    streaming: { bufferingGoal: 30, rebufferingGoal: 2 },
    abr:       { enabled: true },
  });

  shakaPlayer.addEventListener('error', e => {
    console.error('Shaka error', e.detail);
    if (e.detail.severity === shaka.util.Error.Severity.CRITICAL) {
      showError(`Playback error [${e.detail.code}]: ${e.detail.message || 'unknown'}`);
    }
  });

  shakaPlayer.addEventListener('trackschanged', () => {
    populateQualityPanel();
  });

  shakaPlayer.addEventListener('adaptation', () => {
    syncQualitySelection();
  });
}

async function loadStream() {
  const url = protocol === 'hls'
    ? `/api/recordings/${recordingId}/stream/master.m3u8`
    : `/api/recordings/${recordingId}/stream/manifest.mpd`;

  document.getElementById('loading-msg').textContent =
    `Loading ${protocol.toUpperCase()} stream…`;

  try {
    await shakaPlayer.load(url);
    hideLoading();
    video.play().catch(() => {});
  } catch (e) {
    console.error('Load failed', e);
    showError(`Could not load ${protocol.toUpperCase()} stream: ${e.message}`);
  }
}

async function switchProtocol(proto) {
  if (proto === protocol) return;
  protocol = proto;

  document.getElementById('btn-hls').classList.toggle('active',  proto === 'hls');
  document.getElementById('btn-dash').classList.toggle('active', proto === 'dash');

  const pos = video.currentTime;
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('error-overlay').style.display = 'none';
  document.getElementById('loading-msg').textContent = `Switching to ${proto.toUpperCase()}…`;

  await shakaPlayer.unload();
  await loadStream();

  // Restore position
  if (pos > 0) video.currentTime = pos;
}

async function retryLoad() {
  document.getElementById('error-overlay').style.display = 'none';
  document.getElementById('loading-overlay').classList.remove('hidden');
  await shakaPlayer.unload();
  await loadStream();
}

// ── Quality selection ──────────────────────────────────────────────────────
function populateQualityPanel() {
  if (!shakaPlayer) return;
  const tracks = shakaPlayer.getVariantTracks()
    .filter(t => t.type === 'variant')
    .sort((a, b) => b.videoBandwidth - a.videoBandwidth);

  const sel = document.getElementById('quality-select');
  sel.innerHTML = '<option value="auto">Auto (ABR)</option>';

  const panel = document.getElementById('quality-panel');
  panel.innerHTML = '<span class="res-btn active" data-tid="auto" onclick="setQualityBtn(this,\'auto\')">Auto</span>';

  tracks.forEach(t => {
    const label = t.height ? `${t.height}p` : `${Math.round((t.videoBandwidth||t.bandwidth)/1000)}k`;
    const opt = document.createElement('option');
    opt.value = t.id; opt.textContent = label;
    sel.appendChild(opt);

    const btn = document.createElement('span');
    btn.className = 'res-btn';
    btn.dataset.tid = t.id;
    btn.textContent = label;
    btn.onclick = () => setQualityBtn(btn, t.id);
    panel.appendChild(btn);
  });
}

function syncQualitySelection() {
  if (!shakaPlayer) return;
  const active = shakaPlayer.getVariantTracks().find(t => t.active);
  if (!active) return;
  document.querySelectorAll('.res-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tid === String(active.id));
  });
  const sel = document.getElementById('quality-select');
  if (sel.value !== String(active.id)) sel.value = String(active.id);
}

function setQuality(val) {
  if (!shakaPlayer) return;
  if (val === 'auto') {
    shakaPlayer.configure({ abr: { enabled: true } });
  } else {
    shakaPlayer.configure({ abr: { enabled: false } });
    const track = shakaPlayer.getVariantTracks().find(t => t.id === parseInt(val));
    if (track) shakaPlayer.selectVariantTrack(track, /* clearBuffer */ true);
  }
}

function setQualityBtn(btn, tid) {
  document.querySelectorAll('.res-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('quality-select').value = tid;
  setQuality(tid === 'auto' ? 'auto' : parseInt(tid));
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function populateSidebar(r) {
  // Meta rows
  const rows = [
    ['Recorded',  fmtDate(r.date_recorded)],
    ['Duration',  r.duration_seconds ? fmtDur(r.duration_seconds) : '—'],
    ['Expires',   r.date_expires ? fmtDate(r.date_expires) : '—'],
    ['Retain',    `${r.days_to_retain} day${r.days_to_retain !== 1 ? 's' : ''}`],
    ['Source',    r.source_type || '—'],
    ['Formats',   [r.resolutions_available.length ? 'HLS' : null, r.dash_available ? 'DASH' : null].filter(Boolean).join(', ') || '—'],
    ['Size',      r.file_size_bytes ? fmtBytes(r.file_size_bytes) : '—'],
  ];
  document.getElementById('meta-panel').innerHTML = rows.map(([label, value]) =>
    `<div class="meta-row"><span class="label">${label}</span><span class="value">${escHtml(String(value))}</span></div>`
  ).join('');

  // Stream URLs
  const base = `/api/recordings/${r.id}/stream`;
  const urlPanel = document.getElementById('url-panel');
  const urlRows = [
    { label: 'HLS master', url: `${base}/master.m3u8`, available: r.resolutions_available.length > 0 },
    { label: 'DASH MPD',   url: `${base}/manifest.mpd`, available: r.dash_available },
  ];
  urlPanel.innerHTML = urlRows.map(({ label, url, available }) => available ? `
    <div class="mb-1"><small class="text-muted">${label}</small>
    <div class="url-row">
      <span class="flex-grow-1">${escHtml(url)}</span>
      <button class="copy-btn" onclick="copyUrl('${escHtml(url)}')" title="Copy URL"><i class="bi bi-clipboard"></i></button>
    </div></div>` : '').join('');

  // Description
  document.getElementById('desc-panel').textContent = r.description || '(no description)';

  // Tags
  const tags = document.getElementById('tags-panel');
  tags.innerHTML = r.tags && r.tags.length
    ? r.tags.map(t => `<span class="tag-chip">${escHtml(t)}</span>`).join('')
    : '<span class="text-muted" style="font-size:.82rem;">No tags</span>';
}

function copyUrl(url) {
  navigator.clipboard.writeText(location.origin + url).then(() => {
    const el = document.querySelector('.copy-btn');
    if (el) { el.innerHTML = '<i class="bi bi-clipboard-check"></i>'; setTimeout(() => el.innerHTML = '<i class="bi bi-clipboard"></i>', 1500); }
  });
}

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  s.style.display = s.style.display === 'none' ? '' : 'none';
}

// ── Video controls ─────────────────────────────────────────────────────────
video.addEventListener('timeupdate', () => {
  if (!video.duration) return;
  document.getElementById('seek-bar').value = video.currentTime / video.duration * 1000;
  document.getElementById('cur-time').textContent = fmtDur(video.currentTime);
  document.getElementById('dur-time').textContent = fmtDur(video.duration);
});
video.addEventListener('play',  () => { document.getElementById('play-icon').className = 'bi bi-pause-fill'; });
video.addEventListener('pause', () => { document.getElementById('play-icon').className = 'bi bi-play-fill'; });
video.addEventListener('ended', () => { document.getElementById('play-icon').className = 'bi bi-arrow-repeat'; });

function togglePlay() { video.paused ? video.play() : video.pause(); }
function onSeek(input) { if (video.duration) video.currentTime = (input.value / 1000) * video.duration; }
function toggleMute() {
  video.muted = !video.muted;
  document.getElementById('vol-icon').className = video.muted ? 'bi bi-volume-mute-fill' : 'bi bi-volume-up-fill';
}
function setVolume(val) {
  video.volume = val / 100;
  video.muted  = (val == 0);
  document.getElementById('vol-icon').className = (val == 0) ? 'bi bi-volume-mute-fill' : 'bi bi-volume-up-fill';
}
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.querySelector('.player-col').requestFullscreen();
    document.getElementById('fs-icon').className = 'bi bi-fullscreen-exit';
  } else {
    document.exitFullscreen();
    document.getElementById('fs-icon').className = 'bi bi-fullscreen';
  }
}

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.key === ' ' || e.key === 'k') { e.preventDefault(); togglePlay(); }
  if (e.key === 'ArrowRight') video.currentTime += 10;
  if (e.key === 'ArrowLeft')  video.currentTime -= 10;
  if (e.key === 'ArrowUp')    { video.volume = Math.min(1, video.volume + .1); document.getElementById('vol-bar').value = video.volume * 100; }
  if (e.key === 'ArrowDown')  { video.volume = Math.max(0, video.volume - .1); document.getElementById('vol-bar').value = video.volume * 100; }
  if (e.key === 'f') toggleFullscreen();
  if (e.key === 'm') toggleMute();
  if (e.key === 'h') switchProtocol('hls');
  if (e.key === 'd') switchProtocol('dash');
});

// ── Overlays ───────────────────────────────────────────────────────────────
function hideLoading() { document.getElementById('loading-overlay').classList.add('hidden'); }
function showError(msg) {
  hideLoading();
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error-overlay').style.display = 'flex';
}

// ── Utilities ──────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return r.json();
}
function fmtDur(sec) {
  if (!sec || isNaN(sec)) return '0:00';
  const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso+(iso.endsWith('Z')?'':'Z'))
    .toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtBytes(b) {
  if (b<1024) return b+' B';
  if (b<1048576) return (b/1024).toFixed(1)+' KB';
  if (b<1073741824) return (b/1048576).toFixed(1)+' MB';
  return (b/1073741824).toFixed(2)+' GB';
}
function escHtml(s) {
  return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
</script>
</body>
</html>
